spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: jdbc:mysql://localhost:3306/llm_chat?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: xxx   # 修改为你的 MySQL 密码
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update       # 自动建表
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
  mvc:
    async:
      request-timeout: 200000  # 200 秒，给 LLM 足够时间响应

server:
  port: 8081

jwt:
  # 生成方式: openssl rand -base64 32
  secret: dGhpcyBpcyBhIHNlY3JldCBrZXkgZm9yIGxsbSBjaGF0IHN5c3RlbQ==
  expiration: 86400000   # 24 小时 (ms)

deepseek:
  api-key: xxx   # 填入你的 DeepSeek API Key
  api-url: https://api.deepseek.com/chat/completions
  model: deepseek-chat

logging:
  level:
    com.llmchat: DEBUG
    org.springframework.security: WARN
